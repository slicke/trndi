name: Build & Release (All Platforms)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: {}

# ---------------------------------------------------------------------------------
# WORKFLOW OVERVIEW
# ---------------------------------------------------------------------------------
# 1. "version" job determines the next build number starting at 100 if no releases exist.
#    This number is used for both the GitHub release tag and Linux package versions.
#
# 2. "build" job runs in a matrix to build:
#    - Linux (amd64, arm64)
#    - macOS (arm64)
#    - Windows (x64)
#    Each platform produces its own artifact (.zip, .deb/.rpm for Linux, .dmg for macOS)
#
# 3. "publish" job runs regardless of build outcome ("if: always()").
#    - Downloads all artifacts
#    - Uses "find -type f" to upload only files to the release (avoids directory errors)
#    - Updates or creates the GitHub release with the unified version number
# ---------------------------------------------------------------------------------

concurrency:
  group: trndi-build-${{ github.ref }}
  # Cancel superseded PR builds; never cancel main/release builds
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===================== DETERMINE VERSION =====================
  version:
    runs-on: ubuntu-latest
    # Only determine version for push events to main (skip for PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      build_number: ${{ steps.setver.outputs.build_number }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine next build number (start at 100 if none exist)
        id: setver
        run: |
          git fetch --tags

          # Look for the highest tag of the form "build-<number>"
          LATEST_TAG=$(git tag --sort=-v:refname \
            | grep -E '^build-[0-9]+$' \
            | sed 's/^build-//' \
            | sort -n | tail -1)

          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG=100
          else
            NEXT_TAG=$((LATEST_TAG + 1))
          fi

          echo "build_number=${NEXT_TAG}" >> $GITHUB_OUTPUT
          echo "Next build number: ${NEXT_TAG}"

  # ===================== BUILD MATRIX =====================
  build:
    needs: version
    # Allow build to run even if version job was skipped (for PRs)
    if: always()
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # -------- Linux AMD64 --------
          - name: linux-amd64
            upload_name: linux-amd64-build
            os_target: linux
            arch: amd64
            # Preview image: needed for libqt6pas6/-dev, which only entered the
            # Ubuntu archive in 25.10 (not present on 24.04/ubuntu-latest).
            runner: ubuntu-26.04
            fpc_laz_url: "https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20amd64%20DEB/Lazarus%204.8/fpc-laz_3.2.2-210709_amd64.deb/download"
            fpc_src_url: "https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20amd64%20DEB/Lazarus%204.8/fpc-src_3.2.2-210709_amd64.deb/download"
            laz_url: "https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20amd64%20DEB/Lazarus%204.8/lazarus-project_4.8.0-0_amd64.deb/download"
            qt6_arch_folder: "x86_64-linux"
            deb_arch: amd64
            rpm_arch: x86_64
            cpu_flag: ""
            build_mode: "Extensions (Release)"
            project_file: "Trndi.lpr"

          # -------- Linux ARM64 --------
          - name: linux-arm64
            upload_name: linux-arm64-build
            os_target: linux
            arch: arm64
            # Preview image: needed for libqt6pas6/-dev (see amd64 note above).
            runner: ubuntu-26.04-arm
            fpc_laz_url: "https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20arm64%20DEB/Lazarus%204.8/fpc-laz_3.2.3-240813_arm64.deb/download"
            fpc_src_url: "https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20arm64%20DEB/Lazarus%204.8/fpc-src_3.2.3-240813_arm64.deb/download"
            laz_url: "https://sourceforge.net/projects/lazarus/files/Lazarus%20Linux%20arm64%20DEB/Lazarus%204.8/lazarus-project_4.8.0-0_arm64.deb/download"
            qt6_arch_folder: "aarch64-linux"
            deb_arch: arm64
            rpm_arch: aarch64
            cpu_flag: "--cpu=aarch64"
            build_mode: "No Ext (Release)"
            project_file: "Trndi.lpi"

          # -------- macOS ARM64 --------
          - name: macos-arm64
            upload_name: macos-arm64-build
            os_target: macos
            arch: arm64
            runner: macos-14

          # -------- Windows x64 --------
          - name: windows-x64
            upload_name: windows-x64-build
            os_target: windows
            arch: x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v5

      # ===================== LINUX BUILDER =====================
      - name: Install Lazarus/FPC toolchain (Linux)
        if: matrix.os_target == 'linux'
        uses: ./.github/actions/setup-lazarus
        with:
          fpc_laz_url: ${{ matrix.fpc_laz_url }}
          fpc_src_url: ${{ matrix.fpc_src_url }}
          laz_url: ${{ matrix.laz_url }}
          extra_packages: build-essential wget git cmake ninja-build

      - name: Write buildinfo (Linux)
        if: matrix.os_target == 'linux'
        uses: ./.github/actions/write-buildinfo
        with:
          event_name: ${{ github.event_name }}
          github_ref: ${{ github.ref }}
          build_number: ${{ needs.version.outputs.build_number }}
          pr_number: ${{ github.event.pull_request.number }}
          ref_name: ${{ github.ref_name }}

      - name: Verify embedded assets are current (Linux amd64)
        if: matrix.os_target == 'linux' && matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          # The CareLink login helper is compiled in from a committed .lrs. Fail
          # here if someone edited tools/carelink-login/* without regenerating it
          # (make assets / make.ps1 assets). One platform is enough — the .lrs is
          # platform-neutral. Self-contained (the Linux build calls lazbuild
          # directly and does not otherwise use the Makefile).
          # Resolve lazres from lazbuild's real location (tools/ is its sibling),
          # then fall back to PATH / a filesystem search.
          LAZRES=""
          lb=$(command -v lazbuild 2>/dev/null || true)
          if [ -n "$lb" ]; then
            cand="$(dirname "$(readlink -f "$lb")")/tools/lazres"
            [ -x "$cand" ] && LAZRES="$cand"
          fi
          [ -n "$LAZRES" ] || LAZRES=$(command -v lazres 2>/dev/null || find /usr/lib/lazarus /usr/share/lazarus -name lazres -type f 2>/dev/null | head -n1 || true)
          if [ -z "$LAZRES" ]; then
            echo "::warning::lazres not found on runner; skipping .lrs staleness check"
            exit 0
          fi
          tmp=$(mktemp)
          "$LAZRES" "$tmp" \
            tools/carelink-login/carelink-login.mjs \
            tools/carelink-login/package.json \
            tools/carelink-login/package-lock.json >/dev/null
          # --strip-trailing-cr: compare content only. The committed .lrs is LF
          # (.gitattributes) while lazres line endings are platform-dependent.
          if ! diff --strip-trailing-cr -q "$tmp" assets/carelink_assets.lrs >/dev/null 2>&1; then
            rm -f "$tmp"
            echo "::error::assets/carelink_assets.lrs is stale — run 'make assets' (or make.ps1 assets) and commit the result."
            exit 1
          fi
          rm -f "$tmp"
          echo "assets/carelink_assets.lrs is up to date."

      - name: Build on Linux
        if: matrix.os_target == 'linux'
        run: |
          set -euo pipefail

          # -lqjs resolves through the unversioned libqjs.so symlink, which is
          # not tracked in git (see externals/quickjs/README.md), so recreate it
          # before linking. Absent on arm64, which builds without extensions.
          QJS_DIR="externals/quickjs/prebuilt/${{ matrix.qt6_arch_folder }}"
          if [ -d "$QJS_DIR" ]; then
            real=$(cd "$QJS_DIR" && ls libqjs.so.[0-9]*.[0-9]*.[0-9]* | head -1)
            (cd "$QJS_DIR" && ln -sf "$real" libqjs.so.0 && ln -sf libqjs.so.0 libqjs.so)
          fi

          # Build Trndi
          lazbuild --widgetset=qt6 --build-mode="${{ matrix.build_mode }}" ${{ matrix.cpu_flag }} ${{ matrix.project_file }}

          # Run tests on pull requests (test runner embeds its own Pascal test server)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # On arm64 we don't build extensions in CI — run the no-extensions test target there
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              make noext-test
            else
              make test
            fi
          fi

          # Package portable ZIP (no PNG icon inside)
          mkdir -p artifacts
          cp Trndi artifacts/
          [ -d "lang" ] && cp -r lang artifacts/
          # The binary carries an $ORIGIN runpath, so the QuickJS engine and its
          # ABI shim must travel beside it in every package layout below.
          [ -d "$QJS_DIR" ] && cp -P "$QJS_DIR"/*.so* artifacts/
          # The CareLink login helper is compiled into the binary and written to
          # the user's writable settings folder on demand — nothing to bundle.
          7z a -tzip Trndi-linux-${{ matrix.arch }}.zip ./artifacts/* >/dev/null

          # DEB/RPM installers are built on every event (incl. PRs) so packaging
          # changes can be tested from the run's artifacts. Signing and AppImage
          # remain main-push-only; the publish job is gated on push to main, so
          # PR artifacts never reach a release.
            # Create DEB & RPM installers (with icon inside system paths)
            sudo apt-get install -y ruby ruby-dev build-essential rpm
            sudo gem install --no-document fpm

            # fpm maintainer scripts (optional)
            chmod +x dist/linux/after-install.sh dist/linux/after-remove.sh || true
            PKG_DIR="pkgroot"
            mkdir -p "$PKG_DIR/usr/local/trndi"
            cp Trndi "$PKG_DIR/usr/local/trndi/"
            [ -d "lang" ] && cp -r lang "$PKG_DIR/usr/local/trndi/"
            [ -d "$QJS_DIR" ] && cp -P "$QJS_DIR"/*.so* "$PKG_DIR/usr/local/trndi/"

            # The CareLink login helper is compiled into the binary and written
            # to the user's writable settings folder on demand — nothing to
            # bundle next to it.

            # Optional GNOME Shell top-bar indicator extension source
            if [ -d "gnome-shell-extension/trndi-current" ]; then
              mkdir -p "$PKG_DIR/usr/local/share/trndi/gnome-shell-extension"
              cp -r "gnome-shell-extension/trndi-current" \
                "$PKG_DIR/usr/local/share/trndi/gnome-shell-extension/trndi-current@slicke.com"
            fi

            # Optional KDE Plasma plasmoid (panel widget) source
            if [ -d "kde-plasmoid/trndi-current" ]; then
              mkdir -p "$PKG_DIR/usr/local/share/trndi/kde-plasmoid"
              cp -r "kde-plasmoid/trndi-current" \
                "$PKG_DIR/usr/local/share/trndi/kde-plasmoid/com.slicke.trndi.current"
            fi
            mkdir -p "$PKG_DIR/usr/share/pixmaps"
            [ -f "Trndi.png" ] && cp Trndi.png "$PKG_DIR/usr/share/pixmaps/"
            ICON=Trndi
            mkdir -p "$PKG_DIR/usr/share/applications"
            echo "[Desktop Entry]
            Name=Trndi
            GenericName=GCM Viewer
            X-GNOME-FullName=Trndi
            X-KDE-FullName=Trndi
            X-Unity-FullName=Trndi
            X-KDE-Keywords=trndi;gcm;glucose;monitoring;
            X-DBUS-ServiceName=com.slicke.trndi
            X-DBUS-StartupType=Multi
            Comment=Blood glucose monitoring application
            Exec=/usr/local/trndi/Trndi %U
            Icon=${ICON}
            Type=Application
            Categories=Utility;" > "$PKG_DIR/usr/share/applications/trndi.desktop"
            # Determine package version from Trndi.lpi (Major.Minor.<build>)
            MAJOR=$(sed -n -E 's/.*<MajorVersionNr[^>]*Value="([0-9]+)".*/\1/p' Trndi.lpi | head -n1)
            MINOR=$(sed -n -E 's/.*<MinorVersionNr[^>]*Value="([0-9]+)".*/\1/p' Trndi.lpi | head -n1)
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            # On main: build number from the version job. On PRs: PR number
            # (mirrors the Windows installer versioning). Otherwise: 0.
            BUILD_NUM="${{ needs.version.outputs.build_number }}"
            if [ -z "$BUILD_NUM" ]; then
              if [ "${{ github.event_name }}" = "pull_request" ]; then
                BUILD_NUM="${{ github.event.pull_request.number }}"
              else
                BUILD_NUM="0"
              fi
            fi
            PKG_VERSION="${MAJOR}.${MINOR}.${BUILD_NUM}"
            echo "Packaging version: ${PKG_VERSION}"

            FPM_SCRIPTS=()
            [ -f dist/linux/after-install.sh ] && FPM_SCRIPTS+=(--after-install dist/linux/after-install.sh)
            [ -f dist/linux/after-remove.sh ] && FPM_SCRIPTS+=(--after-remove dist/linux/after-remove.sh)

            fpm -s dir -t deb -n trndi -v "${PKG_VERSION}" --architecture ${{ matrix.deb_arch }} --license "GPLv3" --description "Trndi CGM Viewer" "${FPM_SCRIPTS[@]}" -C "$PKG_DIR" .
            fpm -s dir -t rpm -n trndi -v "${PKG_VERSION}" --architecture ${{ matrix.rpm_arch }} --license "GPLv3" --description "Trndi CGM Viewer" "${FPM_SCRIPTS[@]}" -C "$PKG_DIR" .
            
            # Sign packages if GPG key is available (never on PRs — secrets may
            # be absent on fork PRs and PR artifacts are unpublished anyway)
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "PR build: skipping package signing"
            elif [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
              echo "GPG key available, signing packages..."
              sudo apt-get update
              sudo apt-get install -y debsigs rpm
              
              # Import GPG key and extract key ID
              echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import 2>&1
              GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format=long | grep -A 1 "^sec" | grep -oP '[A-F0-9]{16}' | head -1)
              echo "Using GPG key: ${GPG_KEY_ID}"
              
              # Verify key was imported
              if [ -z "${GPG_KEY_ID}" ]; then
                echo "Error: Failed to extract GPG key ID"
                exit 1
              fi
              
              # Configure RPM macros for signing (create file, not directory)
              # Keep the stock OpenPGP signing command so rpm expands its own
              # file placeholders; only add the key and the extra GPG flags we
              # need for non-interactive CI signing.
              echo "%_openpgp_sign gpg" > ~/.rpmmacros
              echo "%_openpgp_sign_id ${GPG_KEY_ID}" >> ~/.rpmmacros
              echo "%__gpg /usr/bin/gpg" >> ~/.rpmmacros
              echo "%_gpg_digest_algo sha256" >> ~/.rpmmacros
              echo "%_gpg_sign_cmd_extra_args --batch --pinentry-mode loopback --passphrase '${{ secrets.GPG_PASSPHRASE }}'" >> ~/.rpmmacros
              
              # Configure GPG for batch mode with passphrase
              mkdir -p ~/.gnupg
              chmod 700 ~/.gnupg
              echo "use-agent" > ~/.gnupg/gpg.conf
              echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
              echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
              
              # Restart gpg-agent
              gpgconf --kill gpg-agent 2>/dev/null || true
              gpgconf --launch gpg-agent
              
              # Sign DEB package manually (ar-sig format)
              DEB_FILE=$(ls trndi_*${{ matrix.deb_arch }}.deb)
              echo "Signing DEB: ${DEB_FILE}"
              
              # Create detached signature for the DEB
              cat "${DEB_FILE}" | gpg --batch --yes --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --armor --detach-sign --default-key "${GPG_KEY_ID}" > "${DEB_FILE}.asc"
              echo "DEB signature created: ${DEB_FILE}.asc"
              
              # Sign RPM package
              RPM_FILE=$(ls trndi-*.${{ matrix.rpm_arch }}.rpm)
              echo "Signing RPM: ${RPM_FILE}"
              rpm --addsign "${RPM_FILE}"
              
              # Verify signatures were created
              echo "Verifying signatures..."
              gpg --verify "${DEB_FILE}.asc" "${DEB_FILE}" && echo "✓ DEB signature verified" || echo "✗ DEB signature verification failed"
              
              # Import public key to a temporary RPM database for verification
              RPM_DB_DIR="${RUNNER_TEMP}/rpmdb"
              mkdir -p "${RPM_DB_DIR}"
              gpg --armor --export "${GPG_KEY_ID}" > /tmp/rpm-public-key.asc
              rpm --dbpath "${RPM_DB_DIR}" --import /tmp/rpm-public-key.asc
              rpm --dbpath "${RPM_DB_DIR}" --checksig "${RPM_FILE}" && echo "✓ RPM signature verified" || echo "✗ RPM signature verification failed"
              
              echo "Packages signed successfully"
            else
              echo "No GPG key configured, skipping package signing"
            fi
            
            mv trndi_*${{ matrix.deb_arch }}.deb artifacts/
            mv trndi-*.${{ matrix.rpm_arch }}.rpm artifacts/
            # Move signature files if they exist
            [ -f trndi_*${{ matrix.deb_arch }}.deb.asc ] && mv trndi_*${{ matrix.deb_arch }}.deb.asc artifacts/ || true
            
            # Include public signing key if available (for users to verify signatures)
            if [ -f "doc/trndi-signing-key.asc" ]; then
              cp doc/trndi-signing-key.asc artifacts/
              echo "Included public signing key in artifacts"
            fi

          # ===================== BUILD APPIMAGE =====================
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR build: skipping AppImage build"
          else
            echo "Building AppImage..."
            chmod +x dist/linux/build-appimage.sh
            
            # Set version for AppImage
            export VERSION="${PKG_VERSION}"
            
            # Build AppImage (script handles architecture detection)
            if [ "${{ matrix.arch }}" = "amd64" ]; then
              dist/linux/build-appimage.sh x86_64
              mv Trndi-x86_64.AppImage artifacts/
            else
              dist/linux/build-appimage.sh aarch64
              mv Trndi-aarch64.AppImage artifacts/
            fi
            
            echo "✓ AppImage build complete"
          fi

      # ===================== MACOS BUILDER =====================
      - name: Build on macOS
        if: matrix.os_target == 'macos'
        run: |
          set -euo pipefail
          # Determine correct MacPorts pkg for OS
          OSMAJOR="$(sw_vers -productVersion | cut -d. -f1)"
          case "$OSMAJOR" in
            14) OSNAME="14-Sonoma" ;;
            13) OSNAME="13-Ventura" ;;
            12) OSNAME="12-Monterey" ;;
            11) OSNAME="11-BigSur" ;;
            *) echo "Unsupported macOS version: ${OSMAJOR}" >&2; exit 1 ;;
          esac
          # Fetch MacPorts installer directly from official site
          PKG_URL="$(curl -fsSL https://www.macports.org/install.php | grep -Eo "https://[^\"[:space:]]*MacPorts-[0-9.]+-${OSNAME}\.pkg" | head -n1 || true)"
          [ -n "$PKG_URL" ] || { echo "Failed to resolve MacPorts pkg URL" >&2; exit 1; }
          curl -fsSL -o MacPorts.pkg "$PKG_URL"
          sudo installer -pkg MacPorts.pkg -target /
          export PATH="/opt/local/bin:/opt/local/sbin:$PATH"
          sudo port -v selfupdate
          sudo port -N install fpc lazarus p7zip create-dmg

      - name: Write buildinfo (macOS)
        if: matrix.os_target == 'macos'
        uses: ./.github/actions/write-buildinfo
        with:
          event_name: ${{ github.event_name }}
          github_ref: ${{ github.ref }}
          build_number: ${{ needs.version.outputs.build_number }}
          pr_number: ${{ github.event.pull_request.number }}
          ref_name: ${{ github.ref_name }}

      - name: Use macOS-specific dock icon (MAINICON)
        if: matrix.os_target == 'macos'
        run: |
          set -euo pipefail
          # lazbuild embeds Trndi.ico as the MAINICON resource, and the LCL Cocoa
          # widgetset pushes MAINICON to the Dock at startup (overriding the bundle
          # .icns). Swap Trndi.ico for one built from the macOS-specific artwork so
          # the running Dock icon matches. This runs on the macOS job only and is
          # never committed, so other platforms keep the default Trndi.ico. Finder
          # still shows the bundle .icns (built from Trndi-macos.png by dist/macos.sh).
          if [ -f Trndi-macos.png ]; then
            CONV="$(command -v magick || command -v convert || true)"
            if [ -z "$CONV" ]; then
              brew install imagemagick
              CONV="$(command -v magick || command -v convert)"
            fi
            # Cap at 256 (max classic ICO size) so FPC's icon reader parses every entry.
            "$CONV" Trndi-macos.png -background none \
              -define icon:auto-resize=256,128,64,48,32,16 Trndi.ico
            echo "Rebuilt Trndi.ico from Trndi-macos.png for macOS MAINICON"
          else
            echo "Trndi-macos.png not found; keeping default Trndi.ico"
          fi

      - name: Build and package on macOS
        if: matrix.os_target == 'macos'
        run: |
          set -euo pipefail
          export PATH="/opt/local/bin:/opt/local/sbin:$PATH"
          # Build Trndi
          lazbuild --build-mode="No Ext (Release)" --ws=cocoa --cpu=aarch64 --os=darwin Trndi.lpi
          # Package zip & dmg (also on PRs, so packaging changes can be tested;
          # the publish job is gated on push-to-main, so PR artifacts only end up
          # attached to the workflow run, not a release).
          mkdir -p artifacts
          cp Trndi artifacts/
          [ -d "lang" ] && cp -r lang artifacts/
          [ -f "dist/macos_README.txt" ] && cp dist/macos_README.txt artifacts/README.txt
          # The CareLink login helper is compiled into the binary and written to
          # the user's writable settings folder on demand — nothing to bundle.
          7z a -tzip Trndi-macos-silicon.zip ./artifacts/* >/dev/null
          chmod +x dist/macos.sh
          if [ -d "lang" ]; then cp -r lang dist/; fi
          (cd dist && ./macos.sh)
          mv dist/Trndi.dmg Trndi-macos-silicon.dmg

      # ===================== WINDOWS BUILDER =====================
      # Composite action runs with shell: bash (Git Bash on Windows runners) and
      # correctly escapes the {$mode}/{$H+} directives, unlike a PowerShell
      # here-string which would interpolate them away.
      - name: Write buildinfo (Windows)
        if: matrix.os_target == 'windows'
        uses: ./.github/actions/write-buildinfo
        with:
          event_name: ${{ github.event_name }}
          github_ref: ${{ github.ref }}
          build_number: ${{ needs.version.outputs.build_number }}
          pr_number: ${{ github.event.pull_request.number }}
          ref_name: ${{ github.ref_name }}

      - name: Build on Windows
        if: matrix.os_target == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # Install curl (real) and 7-Zip via Chocolatey
          choco install curl 7zip -y
          # Download Lazarus installer via curl
          curl -L --fail -o lazarus-4.8.exe "https://sourceforge.net/projects/lazarus/files/Lazarus%20Windows%2064%20bits/Lazarus%204.8/lazarus-4.8-fpc-3.2.2-win64.exe/download"
          Start-Process '.\lazarus-4.8.exe' -ArgumentList '/VERYSILENT','/SP-','/NORESTART','/DIR=C:\Lazarus' -Wait
          # buildinfo.pp is generated by the write-buildinfo step above
          # Build Trndi.exe
          & 'C:\Lazarus\lazbuild.exe' --lazarusdir='C:\Lazarus' --build-mode='Extensions (Release)' 'Trndi.lpi'
          # The extension engine links quickjs-ng and its ABI shim as DLLs, which
          # Windows resolves from the executable's own directory. Place them next
          # to Trndi.exe so the tests below and the packages built from here work.
          Copy-Item '.\externals\quickjs\prebuilt\x86_64-win64\*.dll' -Destination '.' -Force
          # Run tests on pull requests via the same entry point developers use
          # locally (test runner embeds its own Pascal test server). No extra
          # args: make.ps1 forwards them to both lazbuild and the test exe.
          if ("${{ github.event_name }}" -eq "pull_request") {
            .\make.ps1 test
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          # Package ZIP
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item '.\Trndi.exe' -Destination '.\artifacts\'
          Copy-Item '.\externals\quickjs\prebuilt\x86_64-win64\*.dll' -Destination '.\artifacts\'
          if (Test-Path '.\lang') { Copy-Item '.\lang' -Destination '.\artifacts\lang' -Recurse }
          # The CareLink login helper is compiled into Trndi.exe and written to
          # the user's writable settings folder on demand — nothing to bundle.
          & 'C:\Program Files\7-Zip\7z.exe' a -tzip 'Trndi-windows-x64.zip' .\artifacts\* | Out-Null
          # Determine unified package version from Trndi.lpi (Major.Minor.<build>).
          # On main: build number from the version job. On PRs: PR number (so the
          # installer's embedded VersionInfo is numeric and unique per PR).
          [xml]$lpi = Get-Content 'Trndi.lpi'
          $MAJOR = $lpi.CONFIG.ProjectOptions.VersionInfo.MajorVersionNr.Value
          $MINOR = $lpi.CONFIG.ProjectOptions.VersionInfo.MinorVersionNr.Value
          if ([string]::IsNullOrEmpty($MAJOR)) { $MAJOR = "0" }
          if ([string]::IsNullOrEmpty($MINOR)) { $MINOR = "0" }
          if ("${{ github.event_name }}" -eq "pull_request") {
            $INSTALLER_BUILD = "${{ github.event.pull_request.number }}"
          } elseif ("${{ needs.version.outputs.build_number }}") {
            $INSTALLER_BUILD = "${{ needs.version.outputs.build_number }}"
          } else {
            $INSTALLER_BUILD = "0"
          }
          $PKG_VERSION = "$MAJOR.$MINOR.$INSTALLER_BUILD"
          Write-Host "Packaging version: $PKG_VERSION"

          # Build Inno Setup installer on every Windows build (incl. PRs) so .iss
          # regressions are caught before merge. Pass the unified version so it
          # matches NuGet/Linux on main, and reflects the PR number on PRs.
          choco install innosetup -y
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' "/DMyAppVersion=$PKG_VERSION" '.\dist\windows_setup.iss'
          # Move the generated installer to the root for easier artifact upload
          Move-Item '.\dist\TrndiSetup.exe' '.\TrndiSetup.exe'

          # NuGet packaging/publish only on push to main (not PRs, not workflow_dispatch)
          if ("${{ github.event_name }}" -ne "push" -or "${{ github.ref }}" -ne "refs/heads/main") {
            Write-Host "Not a push to main: skipping NuGet packaging/publish"
          } else {
            choco install nuget.commandline -y
            # Update nuspec with actual version
            $nuspecContent = Get-Content 'dist\trndi.nuspec' -Raw
            $nuspecContent = $nuspecContent -replace 'VERSION_PLACEHOLDER', $PKG_VERSION
            $nuspecContent | Set-Content 'dist\trndi.nuspec' -Encoding UTF8
            # Pack the NuGet package
            & nuget pack 'dist\trndi.nuspec' -OutputDirectory '.'
            # Publish to GitHub Packages
            & nuget sources Add -Name "GitHub" -Source "https://nuget.pkg.github.com/slicke/index.json" -UserName slicke -Password ${{ secrets.GITHUB_TOKEN }}
            & nuget push trndi.*.nupkg -Source "GitHub" -SkipDuplicate
          }

      # ===================== UPLOAD ARTIFACTS =====================
      - name: Upload Actions artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.upload_name }}
          path: |
            *.zip
            *.dmg
            *.nupkg
            TrndiSetup.exe
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.asc
            artifacts/*.AppImage
          if-no-files-found: ignore
          # Run artifacts are short-lived: release builds are republished to a
          # GitHub Release by the publish job, PR artifacts are throwaway.
          retention-days: 7

  # ===================== PUBLISH =====================
  publish:
    runs-on: ubuntu-latest
    needs: [version, build]
    # Only create/update releases on direct pushes to main (not on pull_request events).
    # This is defense-in-depth: we removed `pull_request` from the workflow triggers above,
    # and additionally ensure the publish job only runs for push events to main.
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - uses: actions/download-artifact@v8
        with:
          path: ./release-files

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          TAG="build-${{ needs.version.outputs.build_number }}"
          TITLE="Trndi build ${{ needs.version.outputs.build_number }}"
          echo "Publishing release $TAG"
          
          # Generate changelog
          CURRENT_NUM="${{ needs.version.outputs.build_number }}"
          PREV_NUM=$((CURRENT_NUM - 1))
          PREV_TAG="build-${PREV_NUM}"
          
          # Get commits for changelog
          git fetch --tags
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            COMMIT_COUNT=$(git log --oneline --no-merges "${PREV_TAG}..HEAD" | wc -l)
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              CHANGELOG=$(git log --oneline --no-merges "${PREV_TAG}..HEAD" | sed 's/^/- /')
            else
              CHANGELOG="- No new commits (build triggered manually or by workflow change)"
            fi
          else
            CHANGELOG="- First build or showing last 10 commits"
            CHANGELOG="${CHANGELOG}\n$(git log --oneline --no-merges -10 | sed 's/^/- /')"
          fi

          # Build release notes dynamically from actual artifact filenames (with descriptions)
          {
            echo "# Trndi Release ${TAG}"
            echo
            echo "[![Donate via PayPal](https://www.paypalobjects.com/en_US/i/btn/btn_donate_LG.gif)](https://www.paypal.com/donate/?business=84S8A9EBJGGK8&no_recurring=0&item_name=Support+Trndi%21&currency_code=SEK)"
            echo
            echo "> This is an automated build of Trndi's latest source code."
            echo
            echo "## 📝 Changes in This Build"
            echo
            echo "${CHANGELOG}"
            echo
            echo "**📦 Important:** Click **\"Show all X assets\"** at the bottom of this page to see all available files for download."
            echo

            # Linux amd64
            echo "### Linux (amd64 / x86_64)"
            echo "Linux computers running on amd64 processors (Extensions supported)"
            shopt -s nullglob globstar
            
            # DEB packages
            debs=(./release-files/linux-amd64-build/**/*.deb)
            if [ ${#debs[@]} -eq 0 ]; then
              echo "- No Debian/Ubuntu (amd64) installer for this build -"
            else
              for f in "${debs[@]}"; do
                echo "- **$(basename "$f")** — **Recommended for Ubuntu/Debian** (best desktop integration)"
              done
            fi
            
            # RPM packages
            rpms=(./release-files/linux-amd64-build/**/*.rpm)
            if [ ${#rpms[@]} -eq 0 ]; then
              echo "- No RPM (x86_64) installer for this build -"
            else
              for f in "${rpms[@]}"; do
                echo "- **$(basename "$f")** — **Recommended for Fedora/RHEL** (best desktop integration)"
              done
            fi
            
            # AppImage
            appimages=(./release-files/linux-amd64-build/**/*.AppImage)
            if [ ${#appimages[@]} -gt 0 ]; then
              for f in "${appimages[@]}"; do
                echo "- $(basename "$f") — Universal AppImage (recommended for Arch, openSUSE, etc.)"
              done
            fi
            
            # Portable ZIP
            files=(./release-files/linux-amd64-build/*.zip)
            if [ ${#files[@]} -eq 0 ]; then
              echo "- No Linux (amd64) releases for this build -"
            else
              for f in "${files[@]}"; do
                echo "- $(basename "$f") — Portable binary + languages"
              done
            fi
            echo

            # Linux arm64
            echo "### Linux (arm64 / aarch64)"
            echo "Linux computers running on arm64 processors, including Raspberry Pi"
            shopt -s nullglob globstar
            
            # DEB packages
            debs=(./release-files/linux-arm64-build/**/*.deb)
            if [ ${#debs[@]} -eq 0 ]; then
              echo "- No Debian/Ubuntu (arm64) installer for this build -"
            else
              for f in "${debs[@]}"; do
                echo "- **$(basename "$f")** — **Recommended for Ubuntu/Debian** (best desktop integration)"
              done
            fi
            
            # RPM packages
            rpms=(./release-files/linux-arm64-build/**/*.rpm)
            if [ ${#rpms[@]} -eq 0 ]; then
              echo "- No RPM (aarch64) installer for this build -"
            else
              for f in "${rpms[@]}"; do
                echo "- **$(basename "$f")** — **Recommended for Fedora/RHEL** (best desktop integration)"
              done
            fi
            
            # AppImage
            appimages=(./release-files/linux-arm64-build/**/*.AppImage)
            if [ ${#appimages[@]} -gt 0 ]; then
              for f in "${appimages[@]}"; do
                echo "- $(basename "$f") — Universal AppImage (recommended for other distributions)"
              done
            fi
            
            # Portable ZIP
            files=(./release-files/linux-arm64-build/*.zip)
            if [ ${#files[@]} -eq 0 ]; then
              echo "- No Linux (arm64) releases for this build -"
            else
              for f in "${files[@]}"; do
                echo "- $(basename "$f") — Portable binary + languages"
              done
            fi
            echo

            # macOS Apple Silicon
            echo "### macOS (Apple Silicon)"
            echo "macOS computers with Apple processors"
            shopt -s nullglob
            files=(./release-files/macos-arm64-build/*.zip)
            if [ ${#files[@]} -eq 0 ]; then
              echo "- No macOS (Apple Silicon) releases for this build -"
            else
              for f in "${files[@]}"; do
                echo "- $(basename "$f") — Portable binary + languages"
              done
            fi
            dmgs=(./release-files/macos-arm64-build/*.dmg)
            if [ ${#dmgs[@]} -eq 0 ]; then
              echo "- No macOS (.dmg) release for this build -"
            else
              for f in "${dmgs[@]}"; do
                echo "- $(basename "$f") — Application (\`.app\`) bundle for drag‑and‑drop install"
              done
            fi
            echo
            echo "#### Special requirements for macOS"
            echo "- Unzip / open the file"
            echo "- In Terminal, run: \`xattr -c /path/to/Trndi\` (or \`.app\` bundle)"
            echo "- Replace \`/path/to/...\` with the actual path"
            echo "- Now you can launch normally"
            echo

            # Windows (x64)
            echo "### Windows (x64)"
            echo "Windows computers (Extensions supported)"
            # If no ZIPs were produced, print a fallback line so the release notes
            # still mention the platform. We use an array to detect an empty glob.
            shopt -s nullglob
            files=(./release-files/windows-x64-build/*.zip)
            if [ ${#files[@]} -eq 0 ]; then
              echo "- No Windows (x64) releases for this build -"
            else
              for f in "${files[@]}"; do
                echo "- $(basename "$f") — Portable binary + languages"
              done
            fi
            exes=(./release-files/windows-x64-build/*.exe)
            if [ ${#exes[@]} -eq 0 ]; then
              echo "- No Windows installer for this build -"
            else
              for f in "${exes[@]}"; do
                echo "- $(basename "$f") — Windows installer (recommended)"
              done
            fi
            nupkgs=(./release-files/windows-x64-build/*.nupkg)
            if [ ${#nupkgs[@]} -eq 0 ]; then
              echo "- No NuGet package for this build -"
            else
              for f in "${nupkgs[@]}"; do
                echo "- $(basename "$f") — Chocolatey package (\`choco install $(basename "$f")\`)"
              done
            fi
            echo
            
            # Package signing key
            echo "---"
            echo
            echo "### 🔐 Package Verification"
            
            if [ -f "doc/trndi-signing-key.asc" ]; then
              echo "Linux packages (DEB/RPM) are cryptographically signed."
              echo
              echo "**Verification:**"
              echo "1. Download the signing key: [trndi-signing-key.asc](https://raw.githubusercontent.com/slicke/trndi/main/doc/trndi-signing-key.asc)"
              echo "2. Import it: \`gpg --import trndi-signing-key.asc\`"
              echo "3. For DEB: \`gpg --verify trndi_*.deb.asc trndi_*.deb\`"
              echo "4. For RPM: \`rpm --import trndi-signing-key.asc && rpm --checksig trndi-*.rpm\`"
            else
              echo "No signing key available for this build."
            fi
          } > RELEASE_NOTES.md

          # Create release if missing
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TITLE" --notes-file RELEASE_NOTES.md --repo "$GITHUB_REPOSITORY"
          fi

          # Upload all files from all artifacts (files only, no directories).
          # Multiple build artifacts can contain the same basename (for example,
          # the shared signing key), so upload each asset name only once.
          declare -A uploaded_assets=()
          upload_files=()
          while IFS= read -r -d '' file; do
            asset_name=$(basename "$file")
            if [ -n "${uploaded_assets[$asset_name]:-}" ]; then
              echo "Skipping duplicate release asset: ${asset_name} ($file)"
              continue
            fi

            uploaded_assets["$asset_name"]="$file"
            upload_files+=("$file")
          done < <(find ./release-files -type f -print0)

          if [ ${#upload_files[@]} -gt 0 ]; then
            gh release upload "$TAG" --clobber --repo "$GITHUB_REPOSITORY" "${upload_files[@]}"
          fi
  # ===================== DISCORD NOTIFICATION =====================
  discord-notify:
    runs-on: ubuntu-latest
    needs: [version, publish]
    # Only notify on successful releases to main
    if: ${{ success() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get Release Info
        id: release_info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ needs.version.outputs.build_number }}"
          
          # Fetch all tags
          git fetch --tags
          
          # Get release URL
          RELEASE_URL=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json url --jq .url)
          echo "release_url=${RELEASE_URL}" >> $GITHUB_OUTPUT
          
          # Get commits since last build tag (not just last commit)
          # Find the previous build tag (one before current)
          CURRENT_NUM="${{ needs.version.outputs.build_number }}"
          PREV_NUM=$((CURRENT_NUM - 1))
          PREV_TAG="build-${PREV_NUM}"
          
          # Check if previous tag exists
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            echo "## Changes in this build" > commits.txt
            echo "" >> commits.txt
            # Get commits between previous tag and current commit
            COMMIT_COUNT=$(git log --oneline --no-merges "${PREV_TAG}..HEAD" | wc -l)
            echo "Found ${COMMIT_COUNT} commits since ${PREV_TAG}"
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              git log --oneline --no-merges "${PREV_TAG}..HEAD" | sed 's/^/- /' >> commits.txt
            else
              echo "- No new commits (build triggered manually or by workflow change)" >> commits.txt
            fi
          else
            echo "## Changes in this build" > commits.txt
            echo "" >> commits.txt
            echo "First build or previous tag not found. Showing last 10 commits:" >> commits.txt
            echo "" >> commits.txt
            git log --oneline --no-merges -10 | sed 's/^/- /' >> commits.txt
          fi

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.WEBHOOK_URL }}
        run: |
          # Read commit messages
          DESCRIPTION=$(cat commits.txt)
          
          # Create Discord embed JSON
          cat << 'EOF' > discord_payload.json
          {
            "content": "||@everyone|| **New Trndi build available!**",
            "username": "Trndi Release Bot",
            "avatar_url": "https://raw.githubusercontent.com/slicke/trndi/main/Trndi.png",
            "embeds": [{
              "title": "Trndi Build ${{ needs.version.outputs.build_number }}",
              "description": "DESCRIPTION_PLACEHOLDER",
              "url": "${{ steps.release_info.outputs.release_url }}",
              "color": 2105893,
              "footer": {
                "text": "Build ${{ needs.version.outputs.build_number }}"
              }
            }]
          }
          EOF
          
          # Escape and insert description (truncate to 2000 chars for Discord limit)
          DESCRIPTION_ESCAPED=$(echo "$DESCRIPTION" | head -c 2000 | jq -Rs .)
          sed -i "s|\"DESCRIPTION_PLACEHOLDER\"|${DESCRIPTION_ESCAPED}|g" discord_payload.json
          
          # Send to Discord
          curl -H "Content-Type: application/json" -d @discord_payload.json "$DISCORD_WEBHOOK"

