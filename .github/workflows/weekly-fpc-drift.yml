name: Weekly FPC Drift Scan

on:
  schedule:
    - cron: '22 3 * * 1'
  workflow_dispatch: {}

concurrency:
  group: trndi-weekly-drift-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  toolchain-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check pinned external URLs in CI config
        id: urlcheck
        run: |
          set -euo pipefail
          mkdir -p build
          REPORT=build/weekly-drift-report.txt
          : > "$REPORT"

          echo "Weekly drift scan report" >> "$REPORT"
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo >> "$REPORT"

          mapfile -t URLS < <(
            grep -Eroh 'https://[^"'\''[:space:]]+' .github/workflows/ .github/actions/ \
              | sed "s/[\"',)]$//" \
              | sort -u
          )

          echo "Found ${#URLS[@]} unique URLs across .github/workflows/ and .github/actions/" >> "$REPORT"
          echo >> "$REPORT"

          FAIL=0
          checked=0
          skipped=0
          for url in "${URLS[@]}"; do
            # Skip non-literal and non-public URLs to avoid false positives.
            if [[ "$url" == *'${'* ]] || [[ "$url" =~ [\[\]{}\\*+?()|] ]]; then
              echo "SKIP $url (template or regex expression)" >> "$REPORT"
              skipped=$((skipped + 1))
              continue
            fi

            if [[ "$url" == *"nuget.pkg.github.com"* ]]; then
              echo "SKIP $url (requires authentication)" >> "$REPORT"
              skipped=$((skipped + 1))
              continue
            fi

            if [[ ! "$url" =~ (/download$|\.(deb|exe|7z|pkg|asc|png|git|json)$) ]]; then
              echo "SKIP $url (non-artifact base URL)" >> "$REPORT"
              skipped=$((skipped + 1))
              continue
            fi

            checked=$((checked + 1))
            if curl -fsS -L --range 0-0 --max-time 30 -o /dev/null "$url"; then
              echo "OK   $url" >> "$REPORT"
            else
              echo "FAIL $url" >> "$REPORT"
              FAIL=1
            fi
          done

          echo >> "$REPORT"
          echo "Summary: checked=$checked skipped=$skipped total=${#URLS[@]}" >> "$REPORT"

          echo >> "$REPORT"
          echo "Pinned version hints (static excerpts from .github/workflows/build.yml; not execution logs):" >> "$REPORT"
          grep -rnE 'Lazarus%20[0-9]+\.[0-9]+|v[0-9]+\.[0-9]+\.[0-9]+|2\.3\.stable|fpc-laz_|qt6pas|mormot2static' .github/workflows/ .github/actions/ >> "$REPORT" || true

          cat "$REPORT"
          if [[ "$FAIL" -ne 0 ]]; then
            echo "One or more pinned URLs are unreachable. See report artifact." >&2
            exit 1
          fi

      - name: Upload drift report
        uses: actions/upload-artifact@v5
        with:
          name: weekly-fpc-drift-report
          path: build/weekly-drift-report.txt
